# 部署游戏到 GitHub Pages：master 有推送即自动构建发布。
# 一次性前置：仓库 Settings → Pages → Source 选 "GitHub Actions"。
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true # 新推送取消进行中的旧部署

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test (shared)
        run: npm test

      - name: Build client
        run: npm run build
        env:
          DEPLOY_BASE: /Battle_DND/ # GitHub Pages 子路径（vite base + 运行时资产 URL 前缀）

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
